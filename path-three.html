  .then(function(km){return crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:b64(V.salt),iterations:V.iter,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);})
  .then(function(key){return crypto.subtle.decrypt({name:"AES-GCM",iv:b64(V.iv)},key,b64(V.ct));})
  .then(function(buf){
    try{sessionStorage.setItem('p3-phrase',phrase);
        sessionStorage.setItem('arch-open','1');
        sessionStorage.setItem('wheel-open','1');
        sessionStorage.setItem('friday-open','1');}catch(e){}
    var html=new TextDecoder().decode(buf);
    document.open();document.write(html);document.close();
  })
  .catch(function(){document.getElementById('err').textContent="Not the word. Romantic guess, though.";});
}
document.getElementById('pass').addEventListener('keydown',function(e){if(e.key==='Enter')unlock();});
try{var c=sessionStorage.getItem('p3-phrase');if(c)decrypt(c);}catch(e){}
</script>
